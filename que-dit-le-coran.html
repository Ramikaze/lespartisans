let activeSubpartId = "introduction";

// Render navigation
function renderNavigation(searchFilter = "") {
  const container = document.getElementById("navPane");
  container.innerHTML = "";
  
  const filterClean = searchFilter.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');

  QURAN_THEMATIC_DATA.forEach(part => {
    // Filter subparts
    const filteredSubparts = part.subparts.filter(s => {
      const matchTitle = s.title.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').includes(filterClean);
      const matchIntro = s.intro.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').includes(filterClean);
      return matchTitle || matchIntro;
    });

    if (filteredSubparts.length === 0) return;

    const partDiv = document.createElement("div");
    partDiv.className = "nav-part";

    const titleEl = document.createElement("div");
    titleEl.className = "nav-part-title";
    titleEl.textContent = part.title;
    partDiv.appendChild(titleEl);

    const listEl = document.createElement("ul");
    listEl.className = "nav-list";

    filteredSubparts.forEach(s => {
      const itemEl = document.createElement("li");
      itemEl.className = `nav-item ${s.id === activeSubpartId ? 'active' : ''}`;
      itemEl.textContent = s.title;
      itemEl.addEventListener("click", () => {
        selectSubpart(s.id);
        closeMobileSidebar();
      });
      listEl.appendChild(itemEl);
    });

    partDiv.appendChild(listEl);
    container.appendChild(partDiv);
  });
}

// Select active subpart and render content
function selectSubpart(id) {
  activeSubpartId = id;
  
  // Find subpart
  let foundSubpart = null;
  let foundPart = null;
  for (const part of QURAN_THEMATIC_DATA) {
    foundSubpart = part.subparts.find(s => s.id === id);
    if (foundSubpart) {
      foundPart = part;
      break;
    }
  }

  if (!foundSubpart) return;

  // Update URL hash without reload
  window.location.hash = id;

  // PostMessage for deep linking parent synchronization
  try {
    window.parent.postMessage({ type: 'nav', state: id }, '*');
  } catch(e) {}

  // Highlight in list
  document.querySelectorAll(".nav-item").forEach(item => {
    item.classList.toggle("active", item.textContent === foundSubpart.title);
  });

  // Render reading pane with fade transition
  const pane = document.getElementById("contentPane");
  pane.classList.remove("animate-fade-in");
  void pane.offsetWidth; // Trigger reflow
  
  let quranBoxesHtml = "";
  if (foundSubpart.quran) {
    foundSubpart.quran.forEach(q => {
      quranBoxesHtml += `
        <div class="quran-box">
          <p class="quran-fr">${q.fr}</p>
          <p class="quran-ref">${q.ref}</p>
        </div>
      `;
    });
  }

  pane.innerHTML = `
    <div class="part-indicator">${foundPart.title}</div>
    <h2 class="subpart-title">${foundSubpart.title}</h2>
    <div class="content-divider"></div>
    <div class="explanation">${foundSubpart.intro}</div>
    ${quranBoxesHtml}
  `;
  pane.classList.add("animate-fade-in");
  
  // Scroll content to top
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Mobile sidebar control
const menuToggleBtn = document.getElementById("menuToggleBtn");
const sidebar = document.getElementById("sidebar");
const mobileOverlay = document.getElementById("mobileOverlay");

menuToggleBtn.addEventListener("click", () => {
  sidebar.classList.toggle("open");
  mobileOverlay.style.display = sidebar.classList.contains("open") ? "block" : "none";
});

mobileOverlay.addEventListener("click", closeMobileSidebar);

function closeMobileSidebar() {
  sidebar.classList.remove("open");
  mobileOverlay.style.display = "none";
}

// Real-time Search input handler
document.getElementById("topicSearch").addEventListener("input", (e) => {
  renderNavigation(e.target.value);
});

// Deep linking from hash on load
function handleInitialHash() {
  const hash = window.location.hash.substring(1);
  if (hash) {
    // Find if the hash matches an existing subpart id
    let exists = false;
    for (const part of QURAN_THEMATIC_DATA) {
      if (part.subparts.some(s => s.id === hash)) {
        exists = true;
        break;
      }
    }
    if (exists) {
      activeSubpartId = hash;
    }
  }
}

// Initial initialization
handleInitialHash();
renderNavigation();
selectSubpart(activeSubpartId);

// Handle back / forward browser navigation hashchange
window.addEventListener("hashchange", () => {
  const hash = window.location.hash.substring(1);
  if (hash && hash !== activeSubpartId) {
    selectSubpart(hash);
  }
});
</script>

<!-- Theme listener inside iframe -->
<script>
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'theme') {
    if (e.data.theme === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
    } else {
      document.documentElement.removeAttribute('data-theme');
    }
  }
});
try {
  if (localStorage.getItem('theme') === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
  }
} catch(e) {}
</script>

<!-- Scroll-to-top feature -->
<script>
(function(){
  var btn = document.getElementById('scrollTopBtn');
  if(!btn) return;
  function check(){
    var st = window.pageYOffset || document.documentElement.scrollTop;
    btn.classList.toggle('visible', st > 250);
  }
  window.addEventListener('scroll', check, {passive:true});
  btn.addEventListener('click', function(){
    window.scrollTo({top:0, behavior:'smooth'});
  });
  check();
})();
</script>
