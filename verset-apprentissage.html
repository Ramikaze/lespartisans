<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#070c18;color:#e2d9c4;font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;line-height:1.6}
body{display:flex;flex-direction:column}

/* Header */
.hdr{position:sticky;top:0;z-index:100;background:rgba(7,12,24,0.97);border-bottom:1px solid rgba(201,168,76,0.18);backdrop-filter:blur(12px);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.hdr-title{font-family:'Cinzel',serif;font-size:17px;font-weight:700;color:#c9a84c;white-space:nowrap}
.hdr-sep{flex:1}
.hdr-verse{font-size:13px;color:#5a6480}

/* Mode tabs */
.modes{display:flex;gap:4px;padding:8px 16px;background:rgba(7,12,24,0.5);border-bottom:1px solid rgba(201,168,76,0.08);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.mode-btn{background:none;border:1px solid rgba(201,168,76,0.12);color:#6a7590;padding:7px 16px;border-radius:10px;font-family:inherit;font-size:14px;cursor:pointer;white-space:nowrap;transition:all .2s}
.mode-btn:hover{border-color:rgba(201,168,76,0.3);color:#9aa3b8}
.mode-btn.active{background:rgba(201,168,76,0.15);border-color:rgba(201,168,76,0.4);color:#c9a84c;font-weight:600}

/* Progress bar */
.progress-bar{height:3px;background:rgba(201,168,76,0.1);flex-shrink:0}
.progress-fill{height:100%;background:#c9a84c;transition:width .4s ease;width:0}

/* Main content */
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative;z-index:1}
.container{max-width:700px;margin:0 auto;padding:28px 20px 80px}

/* Verse selector */
.verse-sel{display:flex;gap:8px;margin-bottom:24px;justify-content:center}
.verse-btn{background:rgba(19,29,53,0.6);border:1px solid rgba(201,168,76,0.15);color:#9aa3b8;padding:8px 18px;border-radius:10px;font-family:inherit;font-size:14px;cursor:pointer;transition:all .2s}
.verse-btn.active{background:rgba(201,168,76,0.15);border-color:#c9a84c;color:#c9a84c;font-weight:600}

/* Stats */
.stats{display:flex;gap:16px;justify-content:center;margin-bottom:28px;flex-wrap:wrap}
.stat{text-align:center;padding:10px 18px;background:rgba(19,29,53,0.5);border:1px solid rgba(201,168,76,0.08);border-radius:10px;min-width:80px}
.stat-num{font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:#c9a84c}
.stat-label{font-size:11px;color:#5a6480;text-transform:uppercase;letter-spacing:.1em}

/* ===================== FLASHCARD ===================== */
.card-area{perspective:1000px;margin:0 auto;max-width:420px}
.card-3d{position:relative;width:100%;min-height:320px;cursor:pointer;transform-style:preserve-3d;transition:transform .5s}
.card-3d.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center}
.card-front{background:rgba(19,29,53,0.8);border:1px solid rgba(201,168,76,0.2)}
.card-back{background:rgba(13,22,42,0.9);border:1px solid rgba(201,168,76,0.3);transform:rotateY(180deg)}
.card-ar{font-family:'Scheherazade New',serif;font-size:3rem;color:#e8e2d0;margin-bottom:16px;direction:rtl;line-height:1.4}
.card-hint{font-size:12px;color:#5a6480;margin-top:12px}
.card-translit{font-size:1.1rem;color:#c9a84c;margin-bottom:12px;font-style:italic}
.card-fr{font-size:1.3rem;color:#e8e2d0;margin-bottom:12px;font-weight:600}
.card-gram{font-size:0.85rem;color:#6a7590;padding:10px 14px;background:rgba(201,168,76,0.05);border-radius:8px;border:1px solid rgba(201,168,76,0.08);margin-top:8px}
.card-actions{display:flex;gap:12px;margin-top:24px;justify-content:center}
.card-act{padding:10px 24px;border-radius:10px;border:none;font-family:inherit;font-size:15px;cursor:pointer;font-weight:600;transition:all .2s}
.card-act.know{background:rgba(76,175,80,0.2);color:#4caf50;border:1px solid rgba(76,175,80,0.3)}
.card-act.know:hover{background:rgba(76,175,80,0.3)}
.card-act.review{background:rgba(255,152,0,0.2);color:#ff9800;border:1px solid rgba(255,152,0,0.3)}
.card-act.review:hover{background:rgba(255,152,0,0.3)}
.card-counter{text-align:center;margin-top:18px;font-size:13px;color:#5a6480}

/* ===================== QUIZ ===================== */
.quiz-question{text-align:center;margin-bottom:28px}
.quiz-ar{font-family:'Scheherazade New',serif;font-size:2.8rem;color:#e8e2d0;direction:rtl;margin-bottom:8px}
.quiz-translit{font-size:0.95rem;color:#c9a84c;opacity:0.7;font-style:italic}
.quiz-prompt{font-size:14px;color:#5a6480;margin-bottom:20px}
.quiz-opts{display:flex;flex-direction:column;gap:10px;max-width:480px;margin:0 auto}
.quiz-opt{background:rgba(19,29,53,0.6);border:1px solid rgba(201,168,76,0.12);border-radius:12px;padding:14px 20px;cursor:pointer;font-size:16px;color:#e2d9c4;transition:all .2s;text-align:left}
.quiz-opt:hover{border-color:rgba(201,168,76,0.3);background:rgba(19,29,53,0.8)}
.quiz-opt.correct{background:rgba(76,175,80,0.15)!important;border-color:#4caf50!important;color:#4caf50!important}
.quiz-opt.wrong{background:rgba(244,67,54,0.15)!important;border-color:#f44336!important;color:#f44336!important}
.quiz-opt.disabled{pointer-events:none;opacity:0.6}
.quiz-feedback{text-align:center;margin-top:20px;font-size:15px;min-height:24px}
.quiz-next{display:none;margin:16px auto 0;background:rgba(201,168,76,0.15);color:#c9a84c;border:1px solid rgba(201,168,76,0.3);padding:10px 28px;border-radius:10px;font-family:inherit;font-size:15px;cursor:pointer}
.quiz-next:hover{background:rgba(201,168,76,0.25)}
.quiz-score{text-align:center;padding:40px 20px}
.quiz-score-num{font-family:'Cinzel',serif;font-size:3rem;font-weight:700;color:#c9a84c;margin-bottom:8px}

/* ===================== RECONSTITUTION ===================== */
.recon-target{min-height:80px;background:rgba(19,29,53,0.4);border:2px dashed rgba(201,168,76,0.2);border-radius:14px;padding:14px;display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;justify-content:flex-end;direction:rtl}
.recon-pool{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:20px}
.recon-word{font-family:'Scheherazade New',serif;font-size:1.4rem;background:rgba(19,29,53,0.7);border:1px solid rgba(201,168,76,0.2);color:#e8e2d0;padding:8px 16px;border-radius:10px;cursor:pointer;transition:all .2s;user-select:none}
.recon-word:hover{border-color:#c9a84c;background:rgba(201,168,76,0.1)}
.recon-word.placed{background:rgba(201,168,76,0.12);border-color:rgba(201,168,76,0.3);color:#c9a84c}
.recon-word.correct{border-color:#4caf50!important;background:rgba(76,175,80,0.12)!important;color:#4caf50!important}
.recon-word.wrong{border-color:#f44336!important;background:rgba(244,67,54,0.12)!important;color:#f44336!important}
.recon-ref{text-align:center;font-size:14px;color:#5a6480;margin-bottom:16px}
.recon-btns{display:flex;gap:10px;justify-content:center;margin-top:16px}
.recon-btn{background:rgba(201,168,76,0.15);color:#c9a84c;border:1px solid rgba(201,168,76,0.3);padding:10px 24px;border-radius:10px;font-family:inherit;font-size:14px;cursor:pointer;transition:all .2s}
.recon-btn:hover{background:rgba(201,168,76,0.25)}
.recon-result{text-align:center;margin-top:16px;font-size:16px;min-height:24px}

/* ===================== REVISION LIST ===================== */
.rev-list{display:flex;flex-direction:column;gap:8px}
.rev-item{display:flex;align-items:center;gap:14px;padding:12px 16px;background:rgba(19,29,53,0.5);border:1px solid rgba(201,168,76,0.08);border-radius:10px}
.rev-ar{font-family:'Scheherazade New',serif;font-size:1.4rem;color:#e8e2d0;min-width:90px;text-align:right;direction:rtl}
.rev-fr{flex:1;font-size:14px;color:#9aa3b8}
.rev-status{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.rev-status.known{background:#4caf50}
.rev-status.unknown{background:#ff9800}

[data-theme="light"] .progress-bar{background:rgba(122,92,36,0.1)!important}
[data-theme="light"] .progress-fill{background:#7a5c24!important}

@media(max-width:600px){
  .container{padding:20px 14px 60px}
  .card-ar{font-size:2.2rem}
  .quiz-ar{font-size:2rem}
  .recon-word{font-size:1.2rem;padding:6px 12px}
  .card-face{padding:24px 18px;min-height:280px}
}
</style>

// State
let curVerse = 0; // 0=all, 255, 256, 257
let curMode = 'flash';
let known = new Set();
let flashIdx = 0;
let quizIdx = 0;
let quizScore = 0;
let quizTotal = 0;

function getWords() {
  return curVerse === 0 ? W : W.filter(w => w.v === curVerse);
}

function shuffle(arr) {
  let a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function updateProgress() {
  let words = getWords();
  let pct = words.length > 0 ? (known.size / W.length * 100) : 0;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('hdrVerse').textContent = known.size + '/' + W.length + ' mots appris';
}

// ===================== FLASHCARD MODE =====================
function renderFlashcards() {
  let words = getWords();
  let unlearned = words.filter(w => !known.has(w.v+'-'+w.p));
  if (unlearned.length === 0) unlearned = words;
  if (flashIdx >= unlearned.length) flashIdx = 0;
  let w = unlearned[flashIdx];
  let key = w.v+'-'+w.p;

  let html = renderVerseSelector();
  html += renderStats();
  html += '<div class="card-area"><div class="card-3d" id="card3d" onclick="this.classList.toggle(\'flipped\')">';
  html += '<div class="card-face card-front"><div class="card-ar">' + w.a + '</div><div class="card-hint">Cliquer pour retourner</div></div>';
  html += '<div class="card-face card-back"><div class="card-translit">' + w.t + '</div><div class="card-fr">' + w.f + '</div>';
  html += '<div class="card-gram">' + w.g + '</div></div>';
  html += '</div></div>';
  html += '<div class="card-actions">';
  html += '<button class="card-act review" onclick="markWord(\'' + key + '\',false)">À revoir</button>';
  html += '<button class="card-act know" onclick="markWord(\'' + key + '\',true)">Je connais ✓</button>';
  html += '</div>';
  html += '<div class="card-counter">' + (flashIdx + 1) + ' / ' + unlearned.length + ' restants</div>';
  document.getElementById('content').innerHTML = html;
  bindVerseButtons();
}

window.markWord = function(key, isKnown) {
  if (isKnown) known.add(key); else known.delete(key);
  flashIdx++;
  updateProgress();
  renderFlashcards();
};

// ===================== QUIZ MODE =====================
function startQuiz() {
  let words = shuffle(getWords());
  quizIdx = 0; quizScore = 0; quizTotal = Math.min(words.length, 15);
  renderQuizQ(words);
}

function renderQuizQ(words) {
  if (quizIdx >= quizTotal) {
    let pct = Math.round(quizScore / quizTotal * 100);
    let html = renderVerseSelector();
    html += '<div class="quiz-score"><div class="quiz-score-num">' + pct + '%</div>';
    html += '<div style="font-size:18px;color:#e8e2d0;margin-bottom:8px">' + quizScore + ' / ' + quizTotal + ' bonnes réponses</div>';
    html += '<div style="color:#5a6480;margin-bottom:24px">' + (pct >= 80 ? 'Excellent ! Tu maîtrises bien ces mots.' : pct >= 50 ? 'Bon effort ! Continue de réviser.' : 'Continue de t\'entraîner avec les flashcards.') + '</div>';
    html += '<button class="recon-btn" onclick="startQuiz()">Recommencer</button></div>';
    document.getElementById('content').innerHTML = html;
    bindVerseButtons();
    return;
  }
  let w = words[quizIdx];
  let allF = W.map(x => x.f);
  let opts = [w.f];
  while (opts.length < 4) {
    let r = allF[Math.floor(Math.random() * allF.length)];
    if (!opts.includes(r)) opts.push(r);
  }
  opts = shuffle(opts);

  let html = renderVerseSelector();
  html += '<div class="quiz-question"><div class="quiz-prompt">Question ' + (quizIdx + 1) + '/' + quizTotal + ' — Que signifie ce mot ?</div>';
  html += '<div class="quiz-ar">' + w.a + '</div>';
  html += '<div class="quiz-translit">' + w.t + '</div></div>';
  html += '<div class="quiz-opts">';
  opts.forEach((o, i) => {
    html += '<div class="quiz-opt" data-correct="' + (o === w.f ? '1' : '0') + '" data-answer="' + w.f.replace(/"/g,'&quot;') + '" onclick="checkQuiz(this)">' + o + '</div>';
  });
  html += '</div><div class="quiz-feedback" id="quizFb"></div>';
  html += '<button class="quiz-next" id="quizNext" onclick="quizIdx++;renderQuizQ(window._quizWords)">Suivant →</button>';
  document.getElementById('content').innerHTML = html;
  window._quizWords = words;
  bindVerseButtons();
}

window.checkQuiz = function(el) {
  let opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(o => {
    o.classList.add('disabled');
    if (o.dataset.correct === '1') o.classList.add('correct');
  });
  if (el.dataset.correct === '1') {
    quizScore++;
    document.getElementById('quizFb').innerHTML = '<span style="color:#4caf50">✓ Bonne réponse !</span>';
    let key = window._quizWords[quizIdx].v + '-' + window._quizWords[quizIdx].p;
    known.add(key);
    updateProgress();
  } else {
    el.classList.add('wrong');
    document.getElementById('quizFb').innerHTML = '<span style="color:#f44336">✗ La bonne réponse était : ' + el.dataset.answer + '</span>';
  }
  document.getElementById('quizNext').style.display = 'block';
};

// ===================== RECONSTITUTION MODE =====================
function renderRecon() {
  let words = getWords();
  // Pick a segment of 5-8 words
  let start = Math.floor(Math.random() * Math.max(1, words.length - 7));
  let seg = words.slice(start, start + Math.min(7, words.length));
  let shuffled = shuffle(seg);

  let html = renderVerseSelector();
  html += '<div class="recon-ref">Remets ces mots dans l\'ordre du verset ' + seg[0].v + ' (mots ' + seg[0].p + '–' + seg[seg.length-1].p + ')</div>';
  html += '<div class="recon-target" id="reconTarget"></div>';
  html += '<div class="recon-pool" id="reconPool">';
  shuffled.forEach((w, i) => {
    html += '<div class="recon-word" data-idx="' + words.indexOf(w) + '" data-pos="' + w.p + '" onclick="placeWord(this)">' + w.a + '</div>';
  });
  html += '</div>';
  html += '<div class="recon-btns">';
  html += '<button class="recon-btn" onclick="checkRecon()">Vérifier</button>';
  html += '<button class="recon-btn" onclick="renderRecon()">Nouveau segment</button>';
  html += '</div>';
  html += '<div class="recon-result" id="reconResult"></div>';
  document.getElementById('content').innerHTML = html;
  window._reconSeg = seg;
  bindVerseButtons();
}

window.placeWord = function(el) {
  let target = document.getElementById('reconTarget');
  let pool = document.getElementById('reconPool');
  if (el.parentNode === target) {
    pool.appendChild(el);
    el.classList.remove('placed');
  } else {
    target.appendChild(el);
    el.classList.add('placed');
  }
};

window.checkRecon = function() {
  let target = document.getElementById('reconTarget');
  let placed = target.querySelectorAll('.recon-word');
  let seg = window._reconSeg;
  if (placed.length !== seg.length) {
    document.getElementById('reconResult').innerHTML = '<span style="color:#ff9800">Place tous les mots d\'abord !</span>';
    return;
  }
  let correct = 0;
  placed.forEach((el, i) => {
    let expected = seg[seg.length - 1 - i].p; // RTL: first in target = last word
    if (parseInt(el.dataset.pos) === expected) {
      el.classList.add('correct');
      correct++;
    } else {
      el.classList.add('wrong');
    }
  });
  if (correct === seg.length) {
    document.getElementById('reconResult').innerHTML = '<span style="color:#4caf50">✓ Parfait ! L\'ordre est correct !</span>';
  } else {
    document.getElementById('reconResult').innerHTML = '<span style="color:#f44336">✗ ' + correct + '/' + seg.length + ' mots bien placés</span>';
  }
};

// ===================== REVUE MODE =====================
function renderRevue() {
  let words = getWords();
  let html = renderVerseSelector();
  html += renderStats();
  html += '<div class="rev-list">';
  words.forEach(w => {
    let key = w.v + '-' + w.p;
    let isKnown = known.has(key);
    html += '<div class="rev-item">';
    html += '<div class="rev-status ' + (isKnown ? 'known' : 'unknown') + '"></div>';
    html += '<div class="rev-ar">' + w.a + '</div>';
    html += '<div class="rev-fr">' + w.t + ' — ' + w.f + '</div>';
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('content').innerHTML = html;
  bindVerseButtons();
}

// ===================== SHARED UI =====================
function renderVerseSelector() {
  return '<div class="verse-sel">' +
    '<button class="verse-btn' + (curVerse===0?' active':'') + '" onclick="setVerse(0)">Tous</button>' +
    '<button class="verse-btn' + (curVerse===255?' active':'') + '" onclick="setVerse(255)">V.255</button>' +
    '<button class="verse-btn' + (curVerse===256?' active':'') + '" onclick="setVerse(256)">V.256</button>' +
    '<button class="verse-btn' + (curVerse===257?' active':'') + '" onclick="setVerse(257)">V.257</button>' +
  '</div>';
}
function renderStats() {
  let words = getWords();
  let k = words.filter(w => known.has(w.v+'-'+w.p)).length;
  return '<div class="stats">' +
    '<div class="stat"><div class="stat-num">' + words.length + '</div><div class="stat-label">Mots</div></div>' +
    '<div class="stat"><div class="stat-num">' + k + '</div><div class="stat-label">Appris</div></div>' +
    '<div class="stat"><div class="stat-num">' + (words.length - k) + '</div><div class="stat-label">À revoir</div></div>' +
  '</div>';
}

window.setVerse = function(v) { curVerse = v; flashIdx = 0; render(); };

function bindVerseButtons() {}

function render() {
  updateProgress();
  if (curMode === 'flash') renderFlashcards();
  else if (curMode === 'quiz') startQuiz();
  else if (curMode === 'recon') renderRecon();
  else if (curMode === 'revue') renderRevue();
}

// Mode switching
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    curMode = this.dataset.mode;
    render();
  });
});

// Theme listener
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'theme') {
    if (e.data.theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
    else document.documentElement.removeAttribute('data-theme');
  }
});
try { if (localStorage.getItem('theme') === 'light') document.documentElement.setAttribute('data-theme', 'light'); } catch(e) {}

render();
</script>
